---
layout: default
---
<article class="max-w-3xl mx-auto px-4 py-12">
  <h1 class="text-4xl font-bold text-gray-900 mb-4">{{ page.title }}</h1>
  
  <div class="flex items-center gap-4 text-sm text-gray-500 mb-8">
    <span>{{ page.date | date: "%B %d, %Y" }}</span>
    {% if page.author %}<span>by {{ page.author }}</span>{% endif %}
  </div>

  <div class="prose prose-lg max-w-none mb-10">
    {{ content }}
  </div>

  <!-- Categories & Tags -->
  <div class="flex flex-wrap gap-2">
    {% for cat in page.categories %}
      <a href="/categories/" class="text-xs bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded-full">#{{ cat }}</a>
    {% endfor %}
    {% for tag in page.tags %}
      <a href="/tags/" class="text-xs bg-green-100 hover:bg-green-200 text-green-700 px-3 py-1 rounded-full">#{{ tag }}</a>
    {% endfor %}
  </div>
</article>
