---
layout: default
title: Categories
permalink: /categories/
---
<div class="max-w-6xl mx-auto px-6 py-12">
  <h1 class="text-4xl font-bold mb-10">Categories</h1>
  {% for category in site.categories %}
    <div class="mb-12">
      <h2 class="text-2xl font-semibold mb-6 border-b pb-2">{{ category[0] | capitalize }} ({{ category[1].size }})</h2>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for post in category[1] %}
          <a href="{{ post.url }}" class="block bg-white p-6 rounded-2xl hover:shadow-md transition">
            <h3 class="font-medium">{{ post.title }}</h3>
            <p class="text-xs text-gray-500 mt-2">{{ post.date | date: "%b %d, %Y" }}</p>
          </a>
        {% endfor %}
      </div>
    </div>
  {% endfor %}
</div>
