---
layout: default
title: Search
permalink: /search/
---
<div class="max-w-4xl mx-auto px-6 py-12">
  <h1 class="text-4xl font-bold mb-8">Search Market Pulse</h1>
  
  <input 
    id="search-input"
    type="text" 
    placeholder="Search posts... (title, content, tags)"
    class="w-full px-6 py-5 text-lg border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500 mb-8">
  
  <div id="search-results" class="grid md:grid-cols-2 gap-6"></div>
</div>

<script>
// Simple client-side search
let posts = [];

async function loadPosts() {
  const res = await fetch('/search.json');
  posts = await res.json();
}

function renderResults(filtered) {
  const container = document.getElementById('search-results');
  container.innerHTML = '';
  
  if (filtered.length === 0) {
    container.innerHTML = `<p class="col-span-2 text-center text-gray-500 py-12">No results found. Try different keywords.</p>`;
    return;
  }

  filtered.forEach(post => {
    const div = document.createElement('div');
    div.className = 'bg-white rounded-2xl p-6 shadow-sm';
    div.innerHTML = `
      <a href="${post.url}" class="text-xl font-semibold hover:text-blue-600 block mb-2">${post.title}</a>
      <p class="text-sm text-gray-500 mb-4">${post.date}</p>
      <p class="text-gray-600 line-clamp-3">${post.excerpt || post.content.substring(0, 180)}...</p>
    `;
    container.appendChild(div);
  });
}

document.getElementById('search-input').addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase().trim();
  if (!term) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }
  
  const filtered = posts.filter(p => 
    p.title.toLowerCase().includes(term) ||
    (p.content && p.content.toLowerCase().includes(term)) ||
    (p.excerpt && p.excerpt.toLowerCase().includes(term))
  );
  
  renderResults(filtered);
});

// Load posts on page load
loadPosts();
</script>
